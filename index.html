<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сюрприз для моей любимой</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#ff9eb5,#ffc2d1,#ffd6e0);
overflow:hidden;
color:white;
}

h1{
margin-top:80px;
font-size:42px;
}

#timer{
font-size:36px;
margin-top:20px;
}

button{
margin-top:60px;
padding:18px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
color:#ff4d8d;
cursor:not-allowed;
opacity:0.6;
transition:0.4s;
}

button.active{
cursor:pointer;
opacity:1;
background:#ff4d8d;
color:white;
box-shadow:0 0 20px rgba(255,255,255,0.7);
}

.heart{
position:absolute;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<h1>До твоего дня рождения осталось 💖</h1>

<div id="timer"></div>

<button id="nextBtn" disabled>Продолжить дальше</button>

<audio autoplay loop>
<source src="music.mp3">
</audio>

<script>

const targetDate = new Date("2026-03-10T00:00:00");
const timer = document.getElementById("timer");
const btn = document.getElementById("nextBtn");

function updateTimer(){

const now = new Date();
const diff = targetDate - now;

if(diff <= 0){

timer.innerHTML = "🎉 С ДНЁМ РОЖДЕНИЯ МОЯ ЛЮБОВЬ 🎉";

btn.disabled=false;
btn.classList.add("active");

btn.onclick = function(){
window.location.href="love.html";
};

return;
}

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/1000/60)%60);
const seconds = Math.floor((diff/1000)%60);

timer.innerHTML = days+"д "+hours+"ч "+minutes+"м "+seconds+"с";

}

setInterval(updateTimer,1000);

function hearts(){

const heart=document.createElement("div");
heart.innerHTML="💗";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

}

setInterval(hearts,300);

</script>
<button id="continueBtn" disabled onclick="goNext()">
Продолжить дальше
</button>
<script>
function goNext(){
window.location.href = "love.html";
}
</script>

</body>
</html>
